shortDescription: |-
  V této úloze se studenti naučí potrápit novopečeného admina. Odhalí podivnou síťovou konfiguraci pobočky Scranton, což po chvíli bádání umožní kompletně převzít komunikaci oběti na vlastní stroje. Nakonec vmanipulují admina do spuštění vlastního kódu pod zástěrkou legitimní síťové dopravy.
